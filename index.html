<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Barbell Log">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Barbell Log</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text2: #888;
      --accent: #ff4d00;
      --accent-dim: #ff4d0033;
      --green: #00c853;
      --green-dim: #00c85322;
      --yellow: #ffd600;
      --red: #ff1744;
      --radius: 12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: calc(var(--safe-bottom) + 16px);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .app-header {
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-header .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      color: #000;
    }

    .app-header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .app-header h1 span { color: var(--accent); }

    .container {
      padding: 0 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* Exercise Selector */
    .exercise-select-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .exercise-select-wrap select {
      width: 100%;
      padding: 16px 20px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 600;
      background: var(--surface);
      color: var(--text);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .exercise-select-wrap select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .exercise-select-wrap::after {
      content: '▾';
      position: absolute;
      right: 18px; top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 18px;
      pointer-events: none;
    }

    /* Stats Banner */
    .stats-banner {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stats-banner.visible { display: grid; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .stat-card.max-card { border-color: var(--accent-dim); }
    .stat-card.e1rm-card { border-color: var(--green-dim); }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
    }

    .stat-card.max-card .stat-value { color: var(--accent); }
    .stat-card.e1rm-card .stat-value { color: var(--green); }

    .stat-sub {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }

    /* Log Form */
    .log-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
    }

    .log-section h3 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      margin-bottom: 16px;
    }

    .set-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 36px;
      gap: 10px;
      align-items: end;
      margin-bottom: 12px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      background: var(--surface2);
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      text-align: center;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .input-group input::placeholder { color: #444; }

    .remove-row-btn {
      width: 36px; height: 44px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--red);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }

    .remove-row-btn:hover { background: #ff17441a; border-color: var(--red); }

    .date-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .date-row input[type="date"] {
      flex: 1;
      padding: 12px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      background: var(--surface2);
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color-scheme: dark;
    }

    .date-row input[type="date"]:focus { outline: none; border-color: var(--accent); }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-add-row {
      flex: 1;
      padding: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      background: var(--surface2);
      color: var(--text);
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-add-row:hover { border-color: var(--accent); color: var(--accent); }

    .btn-save {
      flex: 2;
      padding: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-save:active { transform: scale(0.97); }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* History */
    .history-section {
      margin-bottom: 40px;
    }

    .history-section h3 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .history-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
      font-size: 14px;
    }

    .history-group {
      margin-bottom: 14px;
    }

    .history-date {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .history-entry {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 16px;
      padding: 14px 16px;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .history-entry:last-child { border-bottom: none; }

    .history-entry .he-sets-reps {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
    }

    .history-entry .he-weight {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
    }

    .history-entry .he-e1rm {
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
      text-align: right;
    }

    .delete-entry {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 14px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .delete-entry:hover { color: var(--red); background: #ff17441a; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 24px);
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #000;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state {
      text-align: center;
      padding: 30px;
      color: var(--text2);
    }
  </style>
</head>
<body>
  <div class="app-header">
    <div class="logo">B</div>
    <h1>Barbell<span>Log</span></h1>
  </div>

  <div class="container">
    <!-- Exercise Selector -->
    <div class="exercise-select-wrap">
      <select id="exerciseSelect">
        <option value="" disabled selected>Choose Exercise</option>
        <option>Back Squat</option>
        <option>Front Squat</option>
        <option>Snatch</option>
        <option>Push Press</option>
        <option>Strict Press</option>
        <option>Jerk</option>
        <option>Hang Clean</option>
        <option>Hang Clean & Jerk</option>
      </select>
    </div>

    <!-- Stats Banner -->
    <div class="stats-banner" id="statsBanner">
      <div class="stat-card max-card">
        <div class="stat-label">Current Max</div>
        <div class="stat-value" id="currentMax">—</div>
        <div class="stat-sub" id="maxDetail"></div>
      </div>
      <div class="stat-card e1rm-card">
        <div class="stat-label">Est. 1RM</div>
        <div class="stat-value" id="estimated1RM">—</div>
        <div class="stat-sub" id="e1rmDetail"></div>
      </div>
    </div>

    <!-- Log Form -->
    <div class="log-section" id="logSection" style="display:none">
      <h3>Log Workout</h3>
      <div class="date-row">
        <input type="date" id="workoutDate">
      </div>
      <div id="setRows"></div>
      <div class="form-actions">
        <button class="btn-add-row" id="addRowBtn">+ Row</button>
        <button class="btn-save" id="saveBtn">Save Workout</button>
      </div>
    </div>

    <!-- History -->
    <div class="history-section" id="historySection" style="display:none">
      <h3>History</h3>
      <div id="historyContent">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── Supabase Init ──
    const SUPABASE_URL = 'https://nzinvxticgyjobkqxxhl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56aW52eHRpY2d5am9ia3F4eGhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5NTUwOTIsImV4cCI6MjA4NDUzMTA5Mn0.YhaW1zesBaEC6lRMWx6_gyZN5Uhh8FX2wgahunHQfok';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── DOM ──
    const exerciseSelect = document.getElementById('exerciseSelect');
    const statsBanner = document.getElementById('statsBanner');
    const logSection = document.getElementById('logSection');
    const historySection = document.getElementById('historySection');
    const setRows = document.getElementById('setRows');
    const saveBtn = document.getElementById('saveBtn');
    const addRowBtn = document.getElementById('addRowBtn');
    const workoutDate = document.getElementById('workoutDate');
    const toast = document.getElementById('toast');

    // ── State ──
    let currentExercise = '';
    let rowCount = 0;

    // ── Init ──
    workoutDate.value = new Date().toISOString().split('T')[0];

    // ── Epley 1RM Formula ──
    function calc1RM(weight, reps) {
      if (reps === 1) return weight;
      return Math.round(weight * (1 + reps / 30));
    }

    // ── Toast ──
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // ── Add a set row ──
    function addSetRow(sets = '', reps = '', weight = '') {
      rowCount++;
      const id = rowCount;
      const row = document.createElement('div');
      row.className = 'set-row';
      row.id = `row-${id}`;
      row.innerHTML = `
        <div class="input-group">
          <label>Sets</label>
          <input type="number" inputmode="numeric" placeholder="3" min="1" value="${sets}" data-field="sets">
        </div>
        <div class="input-group">
          <label>Reps</label>
          <input type="number" inputmode="numeric" placeholder="5" min="1" value="${reps}" data-field="reps">
        </div>
        <div class="input-group">
          <label>Weight</label>
          <input type="number" inputmode="decimal" placeholder="225" min="1" value="${weight}" data-field="weight">
        </div>
        <button class="remove-row-btn" onclick="removeRow(${id})" title="Remove">×</button>
      `;
      setRows.appendChild(row);
    }

    function removeRow(id) {
      const row = document.getElementById(`row-${id}`);
      if (row && setRows.children.length > 1) {
        row.remove();
      }
    }

    // ── Exercise Change ──
    exerciseSelect.addEventListener('change', async () => {
      currentExercise = exerciseSelect.value;
      logSection.style.display = 'block';
      historySection.style.display = 'block';

      // Reset form rows
      setRows.innerHTML = '';
      rowCount = 0;
      addSetRow();

      // Load stats + history
      await Promise.all([loadStats(), loadHistory()]);
    });

    addRowBtn.addEventListener('click', () => addSetRow());

    // ── Load Stats ──
    async function loadStats() {
      if (!currentExercise) return;

      const { data, error } = await sb
        .from('workout_sets')
        .select('*')
        .eq('exercise', currentExercise)
        .order('weight_lbs', { ascending: false })
        .limit(50);

      if (error || !data || data.length === 0) {
        statsBanner.classList.remove('visible');
        return;
      }

      statsBanner.classList.add('visible');

      // Current Max (heaviest weight lifted)
      const maxEntry = data[0];
      document.getElementById('currentMax').textContent = `${Number(maxEntry.weight_lbs)}`;
      document.getElementById('maxDetail').textContent = `${maxEntry.sets}×${maxEntry.reps} on ${formatDate(maxEntry.workout_date)}`;

      // Best estimated 1RM across all entries
      let best1RM = 0;
      let best1RMEntry = null;
      data.forEach(d => {
        const e1rm = calc1RM(Number(d.weight_lbs), d.reps);
        if (e1rm > best1RM) {
          best1RM = e1rm;
          best1RMEntry = d;
        }
      });

      document.getElementById('estimated1RM').textContent = `${best1RM}`;
      if (best1RMEntry) {
        document.getElementById('e1rmDetail').textContent =
          `from ${Number(best1RMEntry.weight_lbs)}×${best1RMEntry.reps}`;
      }
    }

    // ── Load History ──
    async function loadHistory() {
      if (!currentExercise) return;

      const content = document.getElementById('historyContent');
      content.innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';

      const { data, error } = await sb
        .from('workout_sets')
        .select('*')
        .eq('exercise', currentExercise)
        .order('workout_date', { ascending: false })
        .order('weight_lbs', { ascending: false })
        .limit(100);

      if (error) {
        content.innerHTML = '<div class="history-empty">Error loading history</div>';
        return;
      }

      if (!data || data.length === 0) {
        content.innerHTML = '<div class="history-empty">No history yet — log your first set!</div>';
        return;
      }

      // Group by date
      const groups = {};
      data.forEach(d => {
        const dt = d.workout_date;
        if (!groups[dt]) groups[dt] = [];
        groups[dt].push(d);
      });

      let html = '';
      Object.entries(groups).forEach(([date, entries]) => {
        html += `<div class="history-group"><div class="history-date">${formatDateLong(date)}</div><div class="history-card">`;
        entries.forEach(e => {
          const e1rm = calc1RM(Number(e.weight_lbs), e.reps);
          html += `
            <div class="history-entry">
              <div class="he-sets-reps">${e.sets} × ${e.reps}</div>
              <div class="he-weight">${Number(e.weight_lbs)} lbs</div>
              <div class="he-e1rm">e1RM ${e1rm}</div>
            </div>`;
        });
        html += '</div></div>';
      });

      content.innerHTML = html;
    }

    // ── Save Workout ──
    saveBtn.addEventListener('click', async () => {
      if (!currentExercise) return;

      const rows = setRows.querySelectorAll('.set-row');
      const entries = [];

      for (const row of rows) {
        const sets = parseInt(row.querySelector('[data-field="sets"]').value);
        const reps = parseInt(row.querySelector('[data-field="reps"]').value);
        const weight = parseFloat(row.querySelector('[data-field="weight"]').value);

        if (!sets || !reps || !weight) continue;

        entries.push({
          exercise: currentExercise,
          sets,
          reps,
          weight_lbs: weight,
          workout_date: workoutDate.value
        });
      }

      if (entries.length === 0) {
        showToast('Fill in at least one row');
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      const { error } = await sb.from('workout_sets').insert(entries);

      saveBtn.disabled = false;
      saveBtn.textContent = 'Save Workout';

      if (error) {
        showToast('Error saving — try again');
        console.error(error);
        return;
      }

      showToast('Workout saved ✓');

      // Reset form
      setRows.innerHTML = '';
      rowCount = 0;
      addSetRow();

      // Reload stats + history
      await Promise.all([loadStats(), loadHistory()]);
    });

    // ── Date Formatters ──
    function formatDate(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatDateLong(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
      });
    }

    // ── Service Worker Registration ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
